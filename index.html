<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Детективное Досье ✨</title>
    
    <meta property="og:title" content="С Днём Рождения! 🎂">
    <meta property="og:description" content="Доступ к секретному досье ограничен... 🕵️‍♀️">
    <meta property="og:type" content="website">
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Montserrat:wght@400;600;800&family=Anonymous+Pro:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e1f29 0%, #0f1015 100%);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            color: #f3f4f6;
        }

        /* Элементы заднего фона */
        .spy-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1; 
        }
        .bg-item {
            position: absolute; 
            bottom: -60px;
            color: rgba(255, 77, 109, 0.15);
            font-size: 26px; 
            animation: floatUp 6s linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* Главный контейнер */
        .case-container {
            position: relative;
            background: rgba(25, 26, 35, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px 25px;
            border-radius: 32px;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.5),
                inset 0 0 0 1px rgba(255, 255, 255, 0.08),
                0 0 30px rgba(255, 77, 109, 0.05);
            width: 90%;
            max-width: 380px;
            min-height: 520px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            border: 1px solid rgba(255, 77, 109, 0.15);
            text-align: center;
        }

        .screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-grow: 1;
        }
        .screen.active {
            display: flex;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Штамп "TOP SECRET" */
        .top-secret-stamp {
            position: absolute;
            top: -15px;
            right: -10px;
            border: 3px dashed #ff4d6d;
            color: #ff4d6d;
            font-family: 'Anonymous Pro', monospace;
            font-size: 14px;
            font-weight: bold;
            padding: 4px 10px;
            transform: rotate(12deg);
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.85;
            background: #1e1f29;
            pointer-events: none;
            z-index: 50;
        }

        .icon-box { 
            font-size: 65px; 
            margin-bottom: 20px; 
            filter: drop-shadow(0 0 10px rgba(255,77,109,0.3));
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #f3f4f6;
        }

        /* Стили экрана блокировки / Ввода пароля */
        .code-title {
            font-family: 'Anonymous Pro', monospace;
            color: #ff4d6d;
            font-size: 15px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .input-spy {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-spy:focus {
            border-color: #ff4d6d;
            box-shadow: 0 0 15px rgba(255, 77, 109, 0.2);
        }
        .input-spy.error {
            border-color: #ef4444;
            animation: inputShake 0.4s ease;
        }
        @keyframes inputShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Общие стили кнопок */
        button {
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-unlock {
            background: linear-gradient(135deg, #ff4d6d 0%, #ff758c 100%);
            color: white;
            padding: 14px 35px;
            font-size: 15px;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
        }
        .btn-unlock:active { transform: scale(0.95); }

        /* Экран с делом (Основной вопрос) */
        .button-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
            min-height: 80px;
            margin-top: 10px;
        }

        .btn-yes {
            background: linear-gradient(135deg, #22c55e 0%, #4ade80 100%);
            color: white;
            padding: 16px 36px;
            font-size: 18px;
            z-index: 30;
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3);
            position: relative;
        }

        .btn-no {
            background: rgba(243, 244, 246, 0.1);
            border: 1px solid rgba(243, 244, 246, 0.2);
            color: #d1d5db;
            padding: 12px 24px;
            font-size: 15px;
            z-index: 25;
            position: relative;
        }

        /* Экран успеха */
